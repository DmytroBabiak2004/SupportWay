<span
  *ngIf="shouldShow"
  class="role-badge"
  [class.volunteer]="isVolunteer"
  [class.military]="isMilitary"
  [class.xs]="size === 'xs'"
  [class.md]="size === 'md'"
  [title]="label"
  [attr.aria-label]="label">

  <svg *ngIf="isVolunteer" viewBox="0 0 24 24" fill="none" aria-hidden="true">
    <path class="badge-bg" d="M12 2.4 14.55 5l3.62-.52 1.62 3.27 3.21 1.72-1.63 3.27.62 3.58-3.2 1.73-1.62 3.27-3.62-.52L12 21.6 9.45 19l-3.62.52-1.62-3.27L1 14.53l1.63-3.27-.62-3.58 3.2-1.73 1.62-3.27L9.45 5 12 2.4Z"/>
    <path class="badge-line" d="M8.1 12.1 10.7 14.7 16.3 9.3"/>
  </svg>

  <svg *ngIf="isMilitary" viewBox="0 0 24 24" fill="none" aria-hidden="true">
    <path class="badge-bg" d="M12 2.5 20 5.8v6.05c0 5.05-3.35 8.23-8 9.65-4.65-1.42-8-4.6-8-9.65V5.8L12 2.5Z"/>
    <path class="badge-line" d="M12 7.2v8.4"/>
    <path class="badge-line" d="M8.6 10.6h6.8"/>
    <path class="badge-line" d="M9.8 14h4.4"/>
  </svg>
</span>

<div class="composer-shell">
  <div class="composer">
    <textarea
      #messageInput
      class="composer-input"
      placeholder="Написати повідомлення..."
      [(ngModel)]="text"
      (input)="onInput()"
      (keydown)="onKeydown($event)"
      rows="1">
    </textarea>

    <button
      (click)="send()"
      [disabled]="!text?.trim()"
      aria-label="Відправити"
      class="composer-send"
      type="button">
      <svg
        class="send-icon"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2.4"
        stroke-linecap="round"
        stroke-linejoin="round">
        <line x1="22" y1="2" x2="11" y2="13" />
        <polygon points="22 2 15 22 11 13 2 9 22 2" />
      </svg>
    </button>
  </div>
</div>

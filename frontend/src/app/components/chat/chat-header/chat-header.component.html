<header class="chat-head">
  <button class="back-btn" (click)="backClicked.emit()" aria-label="Назад">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" width="18" height="18">
      <polyline points="15 18 9 12 15 6"/>
    </svg>
  </button>

  <div class="head-avatar profile-link" (click)="openProfile()">
    <img *ngIf="otherUserPhotoBase64"
         [src]="profileService.getAvatarSrc(otherUserPhotoBase64)"
         [alt]="chatName">
    <span *ngIf="!otherUserPhotoBase64">{{ getInitials(chatName) }}</span>
  </div>

  <div class="head-info">
    <span class="head-name profile-link" (click)="openProfile()">{{ chatName }}</span>
    <span class="head-typing" *ngIf="typingText">{{ typingText }}</span>
  </div>

  <button class="del-btn" (click)="deleteClicked.emit()" title="Видалити чат">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" width="16" height="16">
      <polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/>
    </svg>
  </button>
</header>

<div class="chat-page" [class.chat-opened]="!!selectedChat">

  <app-chat-sidebar
    [chats]="chats"
    [selectedChatId]="selectedChat?.id ?? null"
    [isOpen]="isSidebarOpen"
    (chatSelected)="openChat($event)"
    (chatDeleted)="onSidebarChatDeleted($event)">
  </app-chat-sidebar>

  <div class="chat-main">
    <ng-container *ngIf="selectedChat; else emptyState">

      <app-chat-header
        [chatName]="selectedChat.userName || selectedChat.displayName"
        [profileKey]="(selectedChat.userName ?? selectedChat.userId) ?? null"
        [otherUserPhotoBase64]="selectedChat.otherUserPhotoBase64 ?? null"
        [typingText]="typingText"
        (backClicked)="closeChat()"
        (deleteClicked)="onDeleteChat()">
      </app-chat-header>

      <app-message-list
        [messages]="messages"
        [currentUserId]="userId"
        (deleteRequest)="onDeleteMessage($event)">
      </app-message-list>

      <app-chat-composer
        (messageSent)="sendMessage($event)"
        (typing)="onTyping()">
      </app-chat-composer>

    </ng-container>

    <ng-template #emptyState>
      <app-empty-state></app-empty-state>
    </ng-template>
  </div>

</div>

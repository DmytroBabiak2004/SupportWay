<section class="messages-box" #scrollBox>
  <ng-container *ngFor="let msg of messages; let i = index; trackBy: trackByMsgId">
    <div *ngIf="shouldShowDateSeparator(i)" class="date-separator">
      <span>{{ formatSeparatorDate(msg.sentAt) }}</span>
    </div>

    <app-message-bubble
      [msg]="msg"
      [isMine]="msg.senderId === currentUserId"
      (deleteRequest)="onDelete($event)">
    </app-message-bubble>
  </ng-container>
</section>

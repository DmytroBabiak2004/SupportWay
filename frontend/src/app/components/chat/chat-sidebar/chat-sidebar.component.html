<aside class="sidebar-container">
  <div class="sidebar-header">
    <h2>Повідомлення</h2>

    <div class="search-wrap">
      <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14">
        <circle cx="11" cy="11" r="8"/>
        <path d="m21 21-4.35-4.35" stroke-linecap="round"/>
      </svg>

      <input
        type="text"
        placeholder="Пошук..."
        [(ngModel)]="searchText"
        (ngModelChange)="filterChats()">
    </div>
  </div>

  <div class="chat-list">
    <div *ngFor="let chat of filteredChats"
         class="chat-item"
         [class.active]="selectedChatId === chat.id"
         (click)="openChat(chat)">

      <div class="chat-avatar">
        <img *ngIf="chat.otherUserPhotoBase64"
             [src]="profileService.getAvatarSrc(chat.otherUserPhotoBase64)"
             [alt]="chat.displayName">
        <span *ngIf="!chat.otherUserPhotoBase64">{{ getInitials(chat.displayName) }}</span>
      </div>

      <div class="chat-info">
        <div class="chat-top">
          <span class="chat-name">{{ chat.displayName }}</span>
          <span class="chat-time" *ngIf="chat.lastMessageAt">{{ formatTime(chat.lastMessageAt) }}</span>
        </div>

        <div class="chat-bottom">
          <span class="last-msg" [class.no-msg]="!chat.lastMessage">
            {{ getLastMessagePreview(chat.lastMessage) }}
          </span>
          <span class="unread-badge" *ngIf="chat.unreadCount > 0">{{ chat.unreadCount }}</span>
        </div>
      </div>
    </div>

    <div class="sidebar-empty" *ngIf="filteredChats.length === 0 && searchText">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="32" height="32">
        <circle cx="11" cy="11" r="8"/>
        <path d="m21 21-4.35-4.35" stroke-linecap="round"/>
      </svg>
      <p>Нічого не знайдено</p>
    </div>

    <div class="sidebar-empty" *ngIf="filteredChats.length === 0 && !searchText">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="32" height="32">
        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
      </svg>
      <p>Чатів ще немає</p>
    </div>
  </div>

  <div class="resizer" (mousedown)="startResize($event)"></div>
</aside>

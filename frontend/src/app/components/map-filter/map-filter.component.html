<aside class="mf-sidebar">
  <div class="mf-header">
    <h3>Фільтри</h3>
    <button class="mf-reset" (click)="resetFilters()">Скинути</button>
  </div>

  <!-- Support Type -->
  <div class="mf-group">
    <label class="mf-label">Тип допомоги</label>
    <select class="mf-select" [(ngModel)]="selectedTypeId" (ngModelChange)="applyFilters()">
      <option value="">Всі типи</option>
      <option *ngFor="let t of supportTypes" [value]="t.id">{{ t.nameOfType }}</option>
    </select>
    <div class="mf-loading" *ngIf="loadingTypes">Завантаження...</div>
  </div>

  <!-- Status -->
  <div class="mf-group">
    <label class="mf-label">Статус збору</label>
    <div class="mf-radio-group">
      <label class="mf-radio" [class.checked]="isActive === ''">
        <input type="radio" name="isActive" value="" [(ngModel)]="isActive" (ngModelChange)="applyFilters()"> Всі
      </label>
      <label class="mf-radio" [class.checked]="isActive === 'true'">
        <input type="radio" name="isActive" value="true" [(ngModel)]="isActive" (ngModelChange)="applyFilters()"> Активні
      </label>
      <label class="mf-radio" [class.checked]="isActive === 'false'">
        <input type="radio" name="isActive" value="false" [(ngModel)]="isActive" (ngModelChange)="applyFilters()"> Завершені
      </label>
    </div>
  </div>

  <!-- Region -->
  <div class="mf-group">
    <label class="mf-label">Регіон</label>
    <input class="mf-input" type="text" placeholder="Наприклад: Харків"
           [(ngModel)]="region" (input)="applyFilters()">
  </div>

  <!-- Amounts -->
  <div class="mf-group">
    <label class="mf-label">Мін. зібрано (₴)</label>
    <input class="mf-input" type="number" min="0" placeholder="0"
           [(ngModel)]="minCollected" (input)="applyFilters()">
  </div>

  <div class="mf-group">
    <label class="mf-label">Макс. ціль (₴)</label>
    <input class="mf-input" type="number" min="0" placeholder="Будь-яка"
           [(ngModel)]="maxTarget" (input)="applyFilters()">
  </div>
</aside>

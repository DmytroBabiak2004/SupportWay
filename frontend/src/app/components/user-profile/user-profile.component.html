<main class="profile-page">
  <div class="loader-container" *ngIf="loading">
    <div class="spinner-xl"></div>
  </div>

  <div class="error-banner" *ngIf="error">
    {{ error }}
  </div>

  <div class="profile-container" *ngIf="!loading && profile">
    <section class="profile-top-section">
      <app-profile-card
        [profile]="profile"
        [isOwnProfile]="isOwnProfile"
        [isFollowing]="isFollowing"
        [uploadingPhoto]="uploadingPhoto"
        [savingDescription]="savingDescription"
        (photoSelected)="onPhotoSelected($event)"
        (rateProfile)="setRate($event)"
        (descriptionSaved)="saveDescription($event)"
        (followToggled)="toggleFollow()"
        (messageSent)="sendMessage()"
        (loggedOut)="onLogout()">
      </app-profile-card>
    </section>

    <section class="analytics-section" *ngIf="profile.profileId">

      <div class="analytics-grid">
        <div class="analytics-card heatmap-card">
          <app-profile-heatmap [profileId]="profile.profileId"></app-profile-heatmap>
        </div>

        <div class="analytics-card badges-card">
          <app-profile-badges [profileId]="profile.profileId"></app-profile-badges>
        </div>

        <div class="analytics-card radar-card full-width">
          <app-profile-radar-chart [profileId]="profile.profileId"></app-profile-radar-chart>
        </div>
      </div>
    </section>
  </div>
</main>

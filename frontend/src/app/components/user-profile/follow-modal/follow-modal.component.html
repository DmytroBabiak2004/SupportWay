<div class="fm-backdrop" (click)="closed.emit()">
  <div class="fm-modal" (click)="$event.stopPropagation()">

    <div class="fm-header">
      <h3>{{ title }} <span class="fm-count">{{ users.length }}</span></h3>
      <button class="fm-close" (click)="closed.emit()" aria-label="Закрити">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16">
          <path d="M18 6L6 18M6 6l12 12" stroke-linecap="round"/>
        </svg>
      </button>
    </div>

    <div class="fm-search">
      <input type="text" placeholder="Пошук..." [(ngModel)]="searchText" (ngModelChange)="filter()">
    </div>

    <div class="fm-body">
      <div class="fm-loading" *ngIf="loading">
        <span class="fm-spinner"></span>
      </div>

      <div class="fm-empty" *ngIf="!loading && filtered.length === 0">
        {{ searchText ? 'Нічого не знайдено' : (mode === 'followers' ? 'Підписників ще немає' : 'Підписок ще немає') }}
      </div>

      <div class="fm-item" *ngFor="let user of filtered">
        <div class="fm-avatar" (click)="openProfile(user)">
          <img *ngIf="user.photoBase64"
               [src]="profileService.getAvatarSrc(user.photoBase64)"
               [alt]="user.username">
          <span *ngIf="!user.photoBase64">{{ getInitials(user) }}</span>
        </div>

        <div class="fm-info" (click)="openProfile(user)">
          <div class="fm-name">
            {{ getDisplayName(user) }}
            <span *ngIf="user.isVerified && user.verifiedAs"
                  class="fm-verify-icon"
                  [style.color]="COLORS[user.verifiedAs!]"
                  [title]="'Верифіковано'">
              {{ ICONS[user.verifiedAs!] }}
            </span>
          </div>
          <div class="fm-handle">{{ '@' + user.username }}</div>
        </div>

        <div class="fm-actions">
          <button type="button"
                  class="btn ghost danger"
                  *ngIf="isOwnProfile && mode === 'followers' && user.userId !== currentUserId"
                  (click)="removeFollower(user); $event.stopPropagation()">
            Видалити
          </button>

          <button type="button"
                  class="btn solid unfollow"
                  *ngIf="isOwnProfile && mode === 'following'"
                  (click)="unfollow(user); $event.stopPropagation()">
            Відписатись
          </button>

          <button type="button"
                  class="btn ghost"
                  *ngIf="!isOwnProfile"
                  (click)="openProfile(user); $event.stopPropagation()">
            Профіль →
          </button>
        </div>
      </div>
    </div>
  </div>
</div>

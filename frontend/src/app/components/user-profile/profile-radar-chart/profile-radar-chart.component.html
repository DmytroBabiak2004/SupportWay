<div class="radar-widget">

  <div class="widget-header">
    <div class="header-titles">
      <h3>Напрямки допомоги</h3>
      <p>Аналітика задоволених запитів за категоріями</p>
    </div>
    <div class="total-badge" *ngIf="!loading && !error && totalQuantity > 0">
      <span class="badge-label">Усього</span>
      <strong>{{ totalQuantity }}</strong>
    </div>
  </div>

  <div class="widget-content">

    <div class="state-container" *ngIf="loading">
      <div class="spinner-mini"></div>
    </div>

    <div class="state-container" *ngIf="error">
      <div class="error-text">{{ error }}</div>
    </div>

    <div class="widget-body" *ngIf="!loading && !error">

      <div class="chart-container">
        <svg [attr.viewBox]="'0 0 ' + size + ' ' + size" class="radar-svg">
          <defs>
            <linearGradient id="radarFill" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="#6366f1" stop-opacity="0.4" />
              <stop offset="100%" stop-color="#a855f7" stop-opacity="0.1" />
            </linearGradient>
            <linearGradient id="radarStroke" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="#6366f1" />
              <stop offset="100%" stop-color="#a855f7" />
            </linearGradient>
            <filter id="dropShadow" x="-20%" y="-20%" width="140%" height="140%">
              <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#6366f1" flood-opacity="0.2"/>
            </filter>
          </defs>

          <g class="grid-group">
            <polygon *ngFor="let poly of levelPolygons" [attr.points]="poly" class="grid-level"></polygon>
          </g>

          <g class="axis-group">
            <line *ngFor="let line of axisLines" [attr.x1]="line.x1" [attr.y1]="line.y1" [attr.x2]="line.x2" [attr.y2]="line.y2" class="axis-line"></line>
          </g>

          <g class="data-group" *ngIf="totalQuantity > 0">
            <polygon [attr.points]="chartPolygon" class="data-area" filter="url(#dropShadow)"></polygon>
            <polygon [attr.points]="chartPolygon" class="data-stroke"></polygon>
            <circle *ngFor="let pt of dataPoints" [attr.cx]="pt.x" [attr.cy]="pt.y" r="5" class="data-point"></circle>
          </g>

          <g class="labels-group">
            <g *ngFor="let lbl of labels" [attr.transform]="'translate(' + lbl.x + ',' + lbl.y + ')'">
              <text [attr.text-anchor]="lbl.textAnchor" class="label-title" dy="-6">{{ lbl.label }}</text>
              <text [attr.text-anchor]="lbl.textAnchor" class="label-value" dy="14">{{ lbl.value }} запитів</text>
            </g>
          </g>
        </svg>

        <div class="empty-overlay" *ngIf="totalQuantity === 0">
          <p>Немає даних для побудови діаграми</p>
        </div>
      </div>

      <div class="stats-container">
        <div class="dominant-card" *ngIf="dominantType">
          <span class="card-subtitle">Основний напрямок</span>
          <h4>{{ dominantType.label }}</h4>
          <div class="dominant-value">{{ dominantType.value }} <span>запитів</span></div>
        </div>

        <div class="bars-list">
          <div class="bar-item" *ngFor="let item of normalizedData; trackBy: trackById">
            <div class="bar-header">
              <span class="bar-label">{{ item.label }}</span>
              <span class="bar-count">{{ item.value }}</span>
            </div>
            <div class="bar-track">
              <div class="bar-fill" [style.width.%]="maxValue ? (item.value / maxValue) * 100 : 0"></div>
            </div>
          </div>
        </div>
      </div>

    </div>
  </div>
</div>

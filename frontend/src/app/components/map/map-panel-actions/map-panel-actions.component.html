<div class="pa-root">

  <div class="pa-stats">
    <div class="pa-stat">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-width="2">
        <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
      </svg>
      <span>{{ likesCount() }}</span>
    </div>
    <div class="pa-stat">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-width="2">
        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
      </svg>
      <span>{{ commentsCount() }}</span>
    </div>

    <span class="pa-spacer"></span>

    <span class="pa-status-badge" [class.active]="isActive()" [class.closed]="!isActive()">
      <span class="pa-dot"></span>
      {{ isActive() ? 'Активний збір' : 'Збір закрито' }}
    </span>
  </div>

  <button class="pa-donate-btn" *ngIf="isActive()" (click)="donate.emit()">
    <span class="pa-btn-icon">💙</span>
    <span class="pa-btn-text">Задонатити</span>
    <span class="pa-btn-arrow">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-width="2.5">
        <path d="M5 12h14M12 5l7 7-7 7" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </span>
  </button>

</div>

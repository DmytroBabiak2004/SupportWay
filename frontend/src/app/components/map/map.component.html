<div class="sw-map-page">

  <!-- Leaflet map container — full screen -->
  <div id="map" class="sw-map-container"></div>

  <!-- Floating marker count pill -->
  <div class="sw-map-pill">
    <app-map-meta-pill
      [isLoading]="isLoading()"
      [totalCount]="totalCount()"/>
  </div>

  <!-- Collapsible floating filter -->
  <app-map-filter
    class="sw-map-filter-float"
    (filtersChanged)="onFiltersChanged($event)"/>

  <!-- Detail side panel -->
  <app-map-side-panel
    [visible]="!!selectedMarker()"
    [isLoading]="isDetailLoading()"
    [error]="detailsError()"
    (closed)="closePanel()"
    (retry)="retryDetails()">

    <ng-container *ngIf="selectedDetails() as d">

      <!-- Header: image, tags, title, author, location -->
      <app-map-panel-header
        [imageSrc]="getImageSrc(d.imageBase64)"
        [authorPhotoSrc]="getImageSrc(d.authorPhotoBase64)"
        [title]="d.title"
        [userName]="d.userName"
        [createdAt]="d.createdAt"
        [requestItems]="d.requestItems"
        [locationName]="d.locationName"
        [locationAddress]="d.locationAddress"/>

      <!-- Description -->
      <p class="sw-panel-content">
        {{ d.content | slice:0:220 }}<span *ngIf="d.content.length > 220">…</span>
      </p>

      <!-- Funding progress -->
      <app-map-panel-progress
        [collectedAmount]="d.collectedAmount"
        [targetAmount]="d.targetAmount"/>

      <!-- Needed items -->
      <app-map-panel-items [items]="d.requestItems"/>

      <!-- Stats, status, donate button -->
      <app-map-panel-actions
        [isActive]="d.isActive"
        [likesCount]="d.likesCount"
        [commentsCount]="d.commentsCount"
        (donate)="openDonateFromPanel()"/>

    </ng-container>

  </app-map-side-panel>

  <!-- Donate modal -->
  <app-donate-modal
    *ngIf="showDonate()"
    [request]="selectedMarker()"
    (closed)="closeDonate()"/>

</div>

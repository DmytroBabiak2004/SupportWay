<div class="sw-map-page">

    <div id="map" class="sw-map-container"></div>

    <div class="sw-status-pill" [class.sw-status-pill--loading]="isLoading()">
        <ng-container *ngIf="isLoading(); else countTpl">
            <span class="sw-pill-spinner"></span>
            <span>Завантаження…</span>
        </ng-container>
        <ng-template #countTpl>
            <svg class="sw-pill-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="10" r="4"/>
                <path d="M12 14c-5 0-8 2.5-8 4v1h16v-1c0-1.5-3-4-8-4z" stroke-linecap="round"/>
            </svg>
            <span>{{ totalCount() | number }} запит{{ totalCount() === 1 ? '' : (totalCount() < 5 ? 'и' : 'ів') }}</span>
        </ng-template>
    </div>

    <button class="sw-my-location-btn" type="button" (click)="detectMyLocation()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16">
            <path d="M12 2v4M12 18v4M2 12h4M18 12h4" stroke-linecap="round"/>
            <circle cx="12" cy="12" r="4"/>
        </svg>
        <span>Моя позиція</span>
    </button>

    <div class="sw-location-error" *ngIf="locationError()">
        {{ locationError() }}
    </div>

    <app-map-filter
            class="sw-map-filter-float"
            (filtersChanged)="onFiltersChanged($event)"/>

    <app-map-details-panel
            [visible]="!!selectedMarker()"
            [isLoading]="isDetailLoading()"
            [error]="detailsError()"
            [details]="selectedDetails()"
            [marker]="selectedMarker()"
            (closed)="closePanel()"
            (retry)="retryDetails()"
            (donate)="openDonateFromPanel()"/>

    <app-donate-modal
            *ngIf="showDonate()"
            [request]="selectedMarker()"
            (closed)="closeDonate()"/>

</div>

<div class="sw-map-page">

  <app-map-filter class="sw-map-sidebar" (filtersChanged)="onFiltersChanged($event)" />

  <div id="map" class="sw-map-container"></div>

  <div class="sw-map-meta" [class.is-loading]="isLoading()">
    <div class="sw-map-meta-surface">
      @if (isLoading()) {
        <span class="sw-loading">
          <svg
            width="16"
            height="16"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2.5"
            stroke-linecap="round"
            stroke-linejoin="round"
            class="spin"
          >
            <path d="M21 12a9 9 0 1 1-6.219-8.56"/>
          </svg>
          Синхронізація...
        </span>
      } @else {
        <div class="sw-meta-content">
          <span class="sw-meta-label">Результатів</span>
          <span class="sw-meta-badge">{{ totalCount() }}</span>
        </div>
      }
    </div>
  </div>

  @if (showDonate()) {
    <app-donate-modal [request]="selectedRequest()" (closed)="closeDonate()" />
  }

</div>

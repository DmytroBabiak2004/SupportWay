<div class="pp-root" *ngIf="targetAmount() > 0">

  <div class="pp-header">
    <span class="pp-label">Зібрано</span>
    <span class="pp-percent" [class.full]="percent() >= 100">
      {{ percent() }}%
    </span>
  </div>

  <div class="pp-track-wrap">
    <div class="pp-track">
      <div class="pp-fill" [style.width.%]="percent()">
        <span class="pp-glow"></span>
      </div>
    </div>
  </div>

  <div class="pp-nums">
    <div class="pp-num pp-num--collected">
      <span class="pp-num-value">{{ collectedAmount() | number:'1.0-0' }} ₴</span>
      <span class="pp-num-caption">зібрано</span>
    </div>
    <div class="pp-milestone" *ngIf="percent() < 100">
      <div class="pp-milestone-dot" [style.left.%]="Math.min(percent(), 98)"></div>
    </div>
    <div class="pp-num pp-num--target">
      <span class="pp-num-value">{{ targetAmount() | number:'1.0-0' }} ₴</span>
      <span class="pp-num-caption">ціль</span>
    </div>
  </div>

</div>

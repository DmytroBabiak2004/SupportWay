<div class="sp-shell" *ngIf="visible()" [class.open]="visible()">

  <!-- Close -->
  <button class="sp-close" (click)="closed.emit()" aria-label="Закрити панель">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
         stroke-width="2.5" width="14" height="14">
      <path d="M18 6L6 18M6 6l12 12" stroke-linecap="round"/>
    </svg>
  </button>

  <div class="sp-scroll">

    <!-- Loading state -->
    <div class="sp-loading" *ngIf="isLoading()">
      <div class="sp-loading-spinner">
        <svg class="spin" width="24" height="24" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2">
          <path d="M21 12a9 9 0 1 1-6.219-8.56" stroke-linecap="round"/>
        </svg>
      </div>
      <span class="sp-loading-text">Завантаження деталей</span>
    </div>

    <!-- Error state -->
    <div class="sp-error" *ngIf="error() && !isLoading()">
      <div class="sp-error-icon">⚠️</div>
      <p class="sp-error-text">{{ error() }}</p>
      <button class="sp-error-retry" (click)="retry.emit()">Спробувати знову</button>
    </div>

    <!-- Content projection -->
    <ng-content *ngIf="!isLoading() && !error()"></ng-content>

  </div>
</div>

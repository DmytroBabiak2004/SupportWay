  <div
    class="dialog-backdrop"
    *ngIf="isOpen"
    [class.help-request-mode]="isHelpRequest()"
    [class.post-mode]="isPost()"
    (click)="closeDialog($event)">

    <article
      class="modal-post-card"
      [class.help-request-card]="isHelpRequest()"
      (click)="stop($event)">

      <button
        class="modal-close"
        type="button"
        aria-label="Закрити"
        (click)="closeDialog($event)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
          <path d="M18 6 6 18"></path>
          <path d="m6 6 12 12"></path>
        </svg>
      </button>

      <header class="post-header">
        <button type="button" class="user-group" (click)="openAuthorProfile()">
          <div class="avatar-container">
            <img
              *ngIf="preview?.authorPhotoBase64; else initialFallback"
              [src]="getAuthorAvatar()"
              alt="author avatar">

            <ng-template #initialFallback>
              <div class="initials">{{ getInitials(getAuthorName()) }}</div>
            </ng-template>
          </div>

          <div class="meta-info">
            <span class="username">{{ getAuthorName() }}</span>
            <span class="date">{{ formatDate(preview?.createdAt) }}</span>
          </div>
        </button>

        <span class="status-pill" [class.request]="isHelpRequest()">
          <span class="status-dot"></span>
          {{ getEntityLabel() }}
        </span>
      </header>

      <div class="post-media" *ngIf="getPreviewImage() as imageSrc" (dblclick)="toggleLike()">
        <div class="image-container">
          <img [src]="imageSrc" alt="post image">
        </div>
      </div>

      <section class="post-body">
        <h2 class="post-title" *ngIf="getTitle()">
          {{ getTitle() }}
        </h2>

        <div class="caption-block" *ngIf="getContent()">
          <button type="button" class="author-name-inline" (click)="openAuthorProfile()">
            {{ getAuthorName() }}
          </button>
          <span class="post-text">{{ getContent() }}</span>
        </div>

        <div class="request-inline-note" *ngIf="isHelpRequest()">
          <span class="note-dot"></span>
          <span>Це запит допомоги. Деталі збору та донат доступні на сторінці запиту.</span>
        </div>
      </section>

      <div class="post-actions-bar">
        <div class="actions-left">
          <button
            type="button"
            class="action-btn like-btn"
            [class.active]="isLiked"
            [disabled]="isLikePending"
            (click)="toggleLike()"
            aria-label="Лайк">
            <svg viewBox="0 0 24 24">
              <path d="M16.792 3.904A4.989 4.989 0 0 1 21.5 9.122c0 3.072-2.652 4.956-5.197 7.222-2.512 2.243-3.865 3.469-4.303 3.752-.477-.309-2.143-1.823-4.303-3.752C5.141 14.072 2.5 12.167 2.5 9.122a4.989 4.989 0 0 1 4.708-5.218 4.21 4.21 0 0 1 3.675 1.941c.84 1.175.98 1.763 1.12 1.763s.278-.588 1.11-1.766a4.17 4.17 0 0 1 3.679-1.938Z"></path>
            </svg>
            <span class="count-label" *ngIf="likesCount > 0">{{ likesCount }}</span>
          </button>

          <button
            type="button"
            class="action-btn comment-btn"
            [class.active]="showComments"
            (click)="toggleComments()"
            aria-label="Коментарі">
            <svg viewBox="0 0 24 24">
              <path d="M20.656 17.008a9.993 9.993 0 1 0-3.59 3.615L22 22Z" fill="none" stroke="currentColor" stroke-linejoin="round" stroke-width="2"></path>
            </svg>
            <span class="count-label" *ngIf="commentsCount > 0">{{ commentsCount }}</span>
          </button>
        </div>
      </div>

      <button
        type="button"
        class="view-comments-link"
        *ngIf="!showComments && commentsCount > 0"
        (click)="toggleComments()">
        Переглянути всі коментарі: {{ commentsCount }}
      </button>

      <section class="comments-section" *ngIf="showComments">
        <div *ngIf="isLoadingComments" class="loading-state">
          Оновлюємо коментарі...
        </div>

        <div class="empty-comments" *ngIf="!isLoadingComments && comments.length === 0">
          Коментарів поки немає
        </div>

        <div
          *ngFor="let comment of comments; trackBy: trackByComment"
          class="comment-item">

          <button
            type="button"
            class="c-avatar"
            (click)="openProfile(comment.userName || comment.userId)">

            <img
              *ngIf="comment.userPhotoBase64; else comInitials"
              [src]="getCommentAvatar(comment)"
              alt="comment author avatar">

            <ng-template #comInitials>
              <div class="initials">{{ getInitials(comment.userName || '?') }}</div>
            </ng-template>
          </button>

          <div class="c-body">
            <div class="c-header">
              <button
                type="button"
                class="c-user"
                (click)="openProfile(comment.userName || comment.userId)">
                {{ comment.userName || 'Unknown' }}
              </button>

              <span class="c-date">{{ formatTime(comment.createdAt) }}</span>
            </div>

            <div class="c-text">{{ comment.text }}</div>
          </div>
        </div>

        <div class="comment-input-wrapper">
          <input
            type="text"
            placeholder="Додати коментар..."
            [(ngModel)]="newCommentText"
            [disabled]="isSendingComment"
            (keydown.enter)="newCommentText.trim() && sendComment()">

          <button
            type="button"
            class="post-link-btn"
            [disabled]="!newCommentText.trim() || isSendingComment"
            (click)="sendComment()">
            {{ isSendingComment ? '...' : 'Опублікувати' }}
          </button>
        </div>
      </section>
    </article>
  </div>
